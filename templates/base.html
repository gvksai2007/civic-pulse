<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CivicPulse — Community Reporting{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0a0a0f;
      --paper: #f5f3ee;
      --accent: #e84033;
      --accent2: #f5a623;
      --muted: #6b6b7a;
      --border: #d8d4c8;
      --card: #ffffff;
      --green: #1db86b;
      --blue: #2563eb;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--ink);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      border-bottom: 3px solid var(--accent);
    }

    .nav-brand {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 800;
      color: #fff; text-decoration: none;
      letter-spacing: -0.02em;
      display: flex; align-items: center; gap: 8px;
    }
    .nav-brand span { color: var(--accent); }

    .nav-links {
      display: flex; align-items: center; gap: 0.25rem;
    }
    .nav-links a {
      color: #ccc; text-decoration: none;
      font-size: 0.85rem; font-weight: 500;
      padding: 6px 14px; border-radius: 4px;
      transition: all 0.15s;
    }
    .nav-links a:hover, .nav-links a.active { color: #fff; background: rgba(255,255,255,0.1); }

    .nav-actions { display: flex; align-items: center; gap: 8px; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 6px;
      font-family: var(--font-body); font-size: 0.85rem; font-weight: 500;
      cursor: pointer; border: none; text-decoration: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #c73028; }
    .btn-outline { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.3); }
    .btn-outline:hover { border-color: #fff; }
    .btn-dark { background: var(--ink); color: #fff; }
    .btn-dark:hover { background: #1a1a2e; }
    .btn-green { background: var(--green); color: #fff; }
    .btn-sm { padding: 5px 12px; font-size: 0.78rem; }

    /* ── FLASH ── */
    .flash { padding: 12px 20px; font-size: 0.875rem; border-left: 4px solid var(--accent); background: #fff3f2; color: #c73028; }

    /* ── BADGE ── */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 3px;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badge-open { background: #fef3c7; color: #d97706; }
    .badge-in_progress { background: #dbeafe; color: #1d4ed8; }
    .badge-resolved { background: #d1fae5; color: #065f46; }
    .badge-low { background: #f3f4f6; color: #6b7280; }
    .badge-medium { background: #fef3c7; color: #d97706; }
    .badge-high { background: #fee2e2; color: #dc2626; }
    .badge-critical { background: #dc2626; color: #fff; }

    /* ── CATEGORY COLORS ── */
    .cat-roads { color: #7c3aed; }
    .cat-lighting { color: #d97706; }
    .cat-sanitation { color: #059669; }
    .cat-vandalism { color: #dc2626; }
    .cat-flooding { color: #2563eb; }
    .cat-parks { color: #16a34a; }
    .cat-other { color: #6b7280; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(10,10,15,0.75); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card); border-radius: 12px;
      width: 90%; max-width: 520px; max-height: 90vh; overflow-y: auto;
      transform: translateY(20px); transition: transform 0.2s;
      border: 1px solid var(--border);
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; }
    .modal-body { padding: 24px; }
    .modal-close { background: none; border: none; cursor: pointer; font-size: 1.1rem; color: var(--muted); }
    .modal-close:hover { color: var(--ink); }

    /* ── FORM ── */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: 6px; font-family: var(--font-body); font-size: 0.9rem;
      background: var(--paper); color: var(--ink); transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none; border-color: var(--accent);
    }
    .form-group textarea { resize: vertical; min-height: 90px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      background: var(--ink); color: #fff;
      padding: 12px 20px; border-radius: 8px;
      font-size: 0.875rem; font-weight: 500;
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s; pointer-events: none;
      border-left: 4px solid var(--green);
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { border-color: var(--accent); }

    footer {
      background: var(--ink); color: #ccc;
      text-align: center; padding: 20px;
      font-size: 0.8rem;
      border-top: 3px solid var(--accent);
    }
    footer span { color: var(--accent); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav>
  <a href="/" class="nav-brand"><i class="fas fa-broadcast-tower"></i>Civic<span>Pulse</span></a>
  <div class="nav-links">
    <a href="/" id="nav-home">Home</a>
    <a href="/dashboard" id="nav-dash">Dashboard</a>
    <a href="/map" id="nav-map">Map</a>
  </div>
  <div class="nav-actions" id="nav-actions">
    <button class="btn btn-outline btn-sm" onclick="openModal('login-modal')">Login</button>
    <button class="btn btn-primary btn-sm" onclick="openModal('register-modal')">Sign Up</button>
  </div>
</nav>

{% block content %}{% endblock %}

<footer>
  <p>Built with ❤️ for communities &mdash; <span>CivicPulse</span> &copy; 2024</p>
</footer>

<!-- Login Modal -->
<div class="modal-overlay" id="login-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Welcome Back</h3>
      <button class="modal-close" onclick="closeModal('login-modal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Login</button>
      <p style="text-align:center;margin-top:14px;font-size:0.85rem;color:var(--muted)">
        No account? <a href="#" onclick="switchModal('login-modal','register-modal')" style="color:var(--accent)">Sign up</a>
      </p>
    </div>
  </div>
</div>

<!-- Register Modal -->
<div class="modal-overlay" id="register-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Join CivicPulse</h3>
      <button class="modal-close" onclick="closeModal('register-modal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="yourname">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="doRegister()">Create Account</button>
      <p style="text-align:center;margin-top:14px;font-size:0.85rem;color:var(--muted)">
        Have account? <a href="#" onclick="switchModal('register-modal','login-modal')" style="color:var(--accent)">Login</a>
      </p>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Modal helpers ──
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function switchModal(from, to) { closeModal(from); openModal(to); }
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ── Toast ──
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type === 'error' ? 'error show' : 'show';
  setTimeout(() => t.className = '', 3000);
}

// ── API helper ──
async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

// ── Auth ──
let currentUser = null;

async function loadUser() {
  const d = await api('/api/me');
  currentUser = d.user;
  renderNavActions();
}

function renderNavActions() {
  const el = document.getElementById('nav-actions');
  if (!el) return;
  if (currentUser) {
    el.innerHTML = `<span style="color:#ccc;font-size:0.82rem">👋 ${currentUser.username}</span>
      <button class="btn btn-outline btn-sm" onclick="doLogout()">Logout</button>`;
  } else {
    el.innerHTML = `<button class="btn btn-outline btn-sm" onclick="openModal('login-modal')">Login</button>
      <button class="btn btn-primary btn-sm" onclick="openModal('register-modal')">Sign Up</button>`;
  }
}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const d = await api('/api/login', 'POST', {email, password});
  if (d.error) { showToast(d.error, 'error'); return; }
  currentUser = d.user; renderNavActions();
  closeModal('login-modal'); showToast('Welcome back!');
  if (window.onAuthChange) onAuthChange();
}

async function doRegister() {
  const username = document.getElementById('reg-username').value;
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  const d = await api('/api/register', 'POST', {username, email, password});
  if (d.error) { showToast(d.error, 'error'); return; }
  currentUser = d.user; renderNavActions();
  closeModal('register-modal'); showToast('Account created! Welcome 🎉');
  if (window.onAuthChange) onAuthChange();
}

async function doLogout() {
  await api('/api/logout', 'POST');
  currentUser = null; renderNavActions();
  showToast('Logged out');
  if (window.onAuthChange) onAuthChange();
}

// ── Nav highlight ──
const path = window.location.pathname;
document.getElementById('nav-home').classList.toggle('active', path === '/');
document.getElementById('nav-dash').classList.toggle('active', path === '/dashboard');
document.getElementById('nav-map').classList.toggle('active', path === '/map');

loadUser();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
